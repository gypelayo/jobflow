<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobFlow</title>
    <link rel="icon" type="image/svg+xml" href="../icons/16/icon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="../icons/32/icon.svg">
    <style>
      * { box-sizing: border-box; }

      body {
        width: 260px;
        margin: 0;
        padding: 20px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        text-align: center;
        background: #0d1117;
        color: #e6edf3;
      }

      .popup-logo {
        width: 40px;
        height: 40px;
        margin: 0 auto 12px;
        border-radius: 10px;
        background: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 800;
        color: #0d1117;
        box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        letter-spacing: -0.5px;
      }

      h3 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .popup-subtitle {
        font-size: 11px;
        color: #484f58;
        margin-bottom: 16px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
      }

      button {
        width: 100%;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        transition: all 0.15s ease;
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
        transform: none !important;
      }

      #extractJob {
        background: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
        color: #0d1117;
        margin-bottom: 8px;
        box-shadow: 0 2px 8px rgba(34, 211, 238, 0.2);
      }

      #extractJob:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
      }

      #extractJob:active:not(:disabled) {
        transform: translateY(0);
      }

      #openDashboard {
        background: #161b22;
        color: #8b949e;
        border: 1px solid #30363d;
      }

      #openDashboard:hover {
        background: #21262d;
        color: #e6edf3;
        border-color: #484f58;
      }

      #status {
        margin-top: 12px;
        font-size: 11px;
        color: #484f58;
        min-height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
      }

      .popup-spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(34, 211, 238, 0.2);
        border-top-color: #22d3ee;
        border-radius: 50%;
        animation: popup-spin 0.6s linear infinite;
        flex-shrink: 0;
      }

      @keyframes popup-spin {
        to { transform: rotate(360deg); }
      }

      .popup-icon {
        font-weight: 700;
        flex-shrink: 0;
        font-size: 12px;
      }

      .popup-icon.done {
        color: #3fb950;
      }

      .popup-icon.error {
        color: #f85149;
      }
    </style>
  </head>
  <body>
    <div class="popup-logo">JF</div>
    <h3>JobFlow</h3>
    <div class="popup-subtitle">AI Job Tracker</div>
    <button id="extractJob">Extract Job</button>
    <button id="openDashboard">Open Dashboard</button>
    <div id="status"></div>
    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
